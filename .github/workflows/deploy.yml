name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build -- --base-href "/pipeline-frontend/"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/pipeline-frontend/browser

      - name: Rollback on failure
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          echo "Build or deployment failed — rolling back to last successful commit"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          LAST_GOOD=$(git log --format="%H" -n 2 | tail -1)
          echo "Rolling back to $LAST_GOOD"
          git revert HEAD --no-edit
          git push origin main
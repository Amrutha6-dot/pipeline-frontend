<div class="add-task-form">
  <input [(ngModel)]="newTaskTitle" type="text" placeholder="Task title" />
  <input [(ngModel)]="newTaskDescription" type="text" placeholder="Description (optional)" />
  <button (click)="addTask()">Add Task</button>
</div>

<div class="board">
  <div class="column">
    <h3>To Do</h3>
    <div class="task-card" *ngFor="let task of todoTasks">
      <h4>{{ task.title }}</h4>
      <p>{{ task.description }}</p>
      <div class="task-actions">
        <button (click)="moveTask(task, 'in-progress')">Move to In Progress →</button>
        <button class="delete-btn" (click)="deleteTask(task.id)">Delete</button>
      </div>
    </div>
  </div>

  <div class="column">
    <h3>In Progress</h3>
    <div class="task-card" *ngFor="let task of inProgressTasks">
      <h4>{{ task.title }}</h4>
      <p>{{ task.description }}</p>
      <div class="task-actions">
        <button (click)="moveTask(task, 'todo')">← Back to To Do</button>
        <button (click)="moveTask(task, 'done')">Move to Done →</button>
        <button class="delete-btn" (click)="deleteTask(task.id)">Delete</button>
      </div>
    </div>
  </div>

  <div class="column">
    <h3>Done</h3>
    <div class="task-card" *ngFor="let task of doneTasks">
      <h4>{{ task.title }}</h4>
      <p>{{ task.description }}</p>
      <div class="task-actions">
        <button (click)="moveTask(task, 'in-progress')">← Back to In Progress</button>
        <button class="delete-btn" (click)="deleteTask(task.id)">Delete</button>
      </div>
    </div>
  </div>
</div>
